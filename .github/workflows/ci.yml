name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (unsigned)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve packages
        run: xcodebuild -project MeetingMinutes.xcodeproj -scheme MeetingMinutes -resolvePackageDependencies

      - name: Build
        run: |
          xcodebuild \
            -project MeetingMinutes.xcodeproj \
            -scheme MeetingMinutes \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
